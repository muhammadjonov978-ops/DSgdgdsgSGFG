<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Amaliyot Yakuni - Shef</title>
    <style>
        body {
            background-color: #0d1117;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .user-card {
            background: #161b22;
            border: 2px solid #30363d;
            border-radius: 15px;
            padding: 30px;
            width: 300px;
            text-align: center;
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: transform 0.3s;
        }

        .user-card:hover {
            transform: translateY(-10px);
            border-color: #58a6ff;
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #58a6ff;
            margin-bottom: 15px;
            background: #21262d;
        }

        h2 { margin: 10px 0 5px 0; color: #58a6ff; }
        p { color: #8b949e; margin: 5px 0; }
        
        .status {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            margin-top: 15px;
            background: #238636;
        }
    </style>
</head>
<body>

    <div id="displayArea">
        </div>

    <script src="main.js"></script>
</body>
</html>
